<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Julián Garzón</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>
    <header class="header">
        <img src="../assets/logoJG_SF.png" alt="Logo de Julián" width="200" class="logo">
        <nav class="links_nav">
            <a href="../index.html">Inicio</a>
            <a href="projects.html">Proyectos</a> 
            <a href="skills.html">Habilidades</a>
            <a href="contact.html" class="active">Contacto</a>
        </nav>
    </header>
    <main class="contact-main">
        <section class="contact-card">
            
            <div class="contact-info">
                <h2>Trabajemos Juntos</h2>
                <p class="contact-subtitle">¿Listo para dar el siguiente salto digital? Hablemos sobre las especificaciones de tu proyecto.</p>
                
                <div class="contact-details">
                    <div class="detail-item">
                        <span class="contact-icon">✉</span>
                        <a href="mailto:julian.garzon08@gmail.com">julian.garzon08@gmail.com</a>
                    </div>
                    <div class="detail-item">
                        <span class="contact-icon">📍</span>
                        <span>Bogotá / Colombia</span>
                    </div>
                </div>
            </div>

            <div class="contact-form-container">
                <form class="contact-form" action="#" method="POST">
                    
                    <div class="input-group">
                        <label for="name">Nombre</label>
                        <input type="text" id="name" name="name" required placeholder="Tu nombre...">
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@correo.com">
                    </div>

                    <div class="input-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Cuéntame sobre tu proyecto..."></textarea>
                    </div>

                    <label class="btn-submit" for="submit">Enviar</label>
                    
                </form>
            </div>

        </section>
    </main>

     <footer>
        <p class="footer-description">&copy; 2024 Julián Garzón. Todos los derechos reservados.</p>
        <nav class="social_links">
            <ul>
                <li><a href="https://www.linkedin.com/in/juliangarzon261b91119/" target="_blank">LinkedIn</a></li>
                <li><a href="https://github.com/Jgarzon08" target="_blank">GitHub</a></li>
            </ul>
        </nav>
    </footer>
</body>

</html>
